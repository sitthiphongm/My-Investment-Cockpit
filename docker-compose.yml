services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: investment_history
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      # Database & Cache
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/investment_history
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      CORS_ORIGINS: '["http://localhost","http://localhost:5173","http://localhost:3000"]'
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      # OAuth
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      FACEBOOK_CLIENT_ID: ${FACEBOOK_CLIENT_ID:-}
      FACEBOOK_CLIENT_SECRET: ${FACEBOOK_CLIENT_SECRET:-}
      OAUTH_REDIRECT_BASE_URL: ${OAUTH_REDIRECT_BASE_URL:-http://localhost:8000}
      # Market Data Providers
      MARKET_DATA_PROVIDER: ${MARKET_DATA_PROVIDER:-yfinance}
      MARKET_DATA_FALLBACK: ${MARKET_DATA_FALLBACK:-yfinance}
      FMP_API_KEY: ${FMP_API_KEY:-}
      ALPHA_VANTAGE_API_KEY: ${ALPHA_VANTAGE_API_KEY:-}
      TWELVE_DATA_API_KEY: ${TWELVE_DATA_API_KEY:-}
      EODHD_API_KEY: ${EODHD_API_KEY:-}
      # FX Rates
      FX_PROVIDER: ${FX_PROVIDER:-manual}
      FX_API_KEY: ${FX_API_KEY:-}
      FX_CACHE_TTL_HOURS: ${FX_CACHE_TTL_HOURS:-24}
      # Cache TTL
      MARKET_DATA_CACHE_TTL: ${MARKET_DATA_CACHE_TTL:-3600}
      TRENDING_CACHE_TTL: ${TRENDING_CACHE_TTL:-900}
      # Provider Resilience
      PROVIDER_CIRCUIT_BREAKER_THRESHOLD: ${PROVIDER_CIRCUIT_BREAKER_THRESHOLD:-5}
      PROVIDER_CIRCUIT_BREAKER_TIMEOUT: ${PROVIDER_CIRCUIT_BREAKER_TIMEOUT:-300}
      PROVIDER_RATE_LIMIT_PER_MINUTE: ${PROVIDER_RATE_LIMIT_PER_MINUTE:-30}
      # Email Notifications
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-smtp}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      ALERT_EMAIL_ENABLED: ${ALERT_EMAIL_ENABLED:-false}
      EMAIL_DEV_MODE: ${EMAIL_DEV_MODE:-true}
      # AI Insights
      AI_PROVIDER: ${AI_PROVIDER:-disabled}
      AI_LOCAL_MODEL_PATH: ${AI_LOCAL_MODEL_PATH:-}
      AI_HOSTED_API_KEY: ${AI_HOSTED_API_KEY:-}
      AI_HOSTED_ENDPOINT: ${AI_HOSTED_ENDPOINT:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python init_db.py && uvicorn main:app --host 0.0.0.0 --port 8000"

  # React Frontend (nginx)
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
